<!DOCTYPE html>
<html>
<head>

<title>Labour Management Login</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">

</head>

<body>

<!-- Install Banner -->

<div id="installBanner" class="install-banner">

<img src="labourproject.png" class="install-icon">

<div class="install-text">
<b>Labour Management</b><br>
Install this app
</div>
<button id="installBtn">Install</button>
<p id="installStatus"></p>
</div>

<!-- Login Page -->

<div id="loginPage" style="display:none;">

<h2>Labour Management System</h2>

<div class="login-box">

<input type="text" id="userid" placeholder="Enter User ID"><br><br>

<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>

<p id="message"></p>

</div>

</div>

<script src="script.js"></script>

<script>

let deferredPrompt;

const banner = document.getElementById("installBanner");
const installBtn = document.getElementById("installBtn");
const loginPage = document.getElementById("loginPage");
const status = document.getElementById("installStatus");


/* Detect install availability */

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt = e;

/* show banner after 2 seconds */

setTimeout(()=>{
banner.style.display = "flex";
},2000);

});


/* Install button click */

installBtn.addEventListener("click", async ()=>{

if(!deferredPrompt) return;

status.innerHTML = "<div class='spinner'></div> Installing...";

installBtn.disabled = true;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

});


/* Detect when app is installed */

window.addEventListener("appinstalled", () => {

status.innerText = "App Installed Successfully";

setTimeout(()=>{
banner.style.display="none";
loginPage.style.display="block";
},1500);

});


/* If already installed */

if (window.matchMedia('(display-mode: standalone)').matches){

banner.style.display = "none";
loginPage.style.display = "block";

}


/* Auto-hide banner if user ignores it */

setTimeout(()=>{

if(banner.style.display === "flex"){
banner.style.display = "none";
loginPage.style.display = "block";
}

},15000);  // 15 seconds


/* Register Service Worker */

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("service_worker.js")
.then(()=>console.log("Service Worker Registered"));

}



</script>



</body>
</html>
