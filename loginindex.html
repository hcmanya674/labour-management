<!DOCTYPE html>
<html>
<head>

<title>Labour Management Login</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">

</head>

<body>
<div id="installGuide" style="margin-top:20px; font-size:14px;">
Install this app for better experience.<br>
Tap the browser menu (⋮) and select <b>Add to Home Screen</b>.
</div>
<h2>Labour Management System</h2>

<div class="login-box">

<input type="text" id="userid" placeholder="Enter User ID"><br><br>

<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>

<br><br>

<button id="installBtn" style="display:none;">Install App</button>

<p id="message"></p>

</div>

<script src="script.js"></script>


<script>

window.addEventListener("load", () => {

let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {

e.preventDefault();
deferredPrompt = e;

installBtn.style.display = "block";

});

installBtn.addEventListener("click", async () => {

if (!deferredPrompt) return;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

installBtn.style.display = "none";

});

});

</script>

<script>

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
.then(() => console.log("Service Worker Registered"));
}
 if (window.matchMedia('(display-mode: standalone)').matches) {

document.getElementById("installGuide").style.display = "none";

}

</script>

</body>
</html>
