<!DOCTYPE html>
<html>
<head>

<title>Labour Management Login</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">

</head>

<body>

<!-- Install Banner -->

<div id="installBanner" class="install-banner">

<img src="labourproject.png" class="install-icon">

<div class="install-text">
<b>Labour Management</b><br>
Install this app
</div>

<button id="installBtn">Install</button>

</div>

<!-- Login Page -->

<div id="loginPage" style="display:none;">

<h2>Labour Management System</h2>

<div class="login-box">

<input type="text" id="userid" placeholder="Enter User ID"><br><br>

<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>

<p id="message"></p>

</div>

</div>

<script src="script.js"></script>

<script>

let deferredPrompt;

const banner = document.getElementById("installBanner");
const installBtn = document.getElementById("installBtn");
const loginPage = document.getElementById("loginPage");


/* Detect install availability */

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt = e;

banner.style.display = "flex";

});


/* Install button */

installBtn.addEventListener("click", async ()=>{

if(deferredPrompt){

deferredPrompt.prompt();

const result = await deferredPrompt.userChoice;

if(result.outcome === "accepted"){

banner.style.display = "none";

loginPage.style.display = "block";

}

deferredPrompt = null;

}

});


/* If already installed */

if (window.matchMedia('(display-mode: standalone)').matches){

banner.style.display = "none";

loginPage.style.display = "block";

}


/* Register Service Worker */

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service_worker.js");
}

</script>

</body>
</html>
