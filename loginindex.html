<!DOCTYPE html>
<html>

<head>

<title>Labour Management Login</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">

</head>

<body>

<div id="installGuide" style="margin-top:20px; font-size:14px; background:yellow;">
Install this app for better experience.<br>
Tap the browser menu (⋮) and select <b>Add to Home Screen</b>.
</div>

<h2>Labour Management System</h2>

<div class="login-box">

<input type="text" id="userid" placeholder="Enter User ID"><br><br>

<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>

<br><br>

<button id="installBtn" style="display:none;">Install App</button>
<button id="openBtn" style="display:none;">Open App</button>
<p id="message"></p>

</div>

<script src="script.js"></script>

<script>
let deferredPrompt = null;

const installBtn = document.getElementById("installBtn");
const openBtn = document.getElementById("openBtn");
const guide = document.getElementById("installGuide");


// Register Service Worker
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}


// Detect install mode
if (window.matchMedia('(display-mode: standalone)').matches) {

guide.style.display = "none";
installBtn.style.display = "none";
openBtn.style.display = "block";

}


// Install prompt
window.addEventListener("beforeinstallprompt", (e) => {

e.preventDefault();
deferredPrompt = e;

installBtn.style.display = "block";

});


// Install button click
installBtn.addEventListener("click", async () => {

if (!deferredPrompt) {

alert("Tap ⋮ → Add to Home Screen to install the app");
return;

}

deferredPrompt.prompt();
await deferredPrompt.userChoice;

deferredPrompt = null;

});


// Open App button
openBtn.addEventListener("click", () => {

window.location.href = "loginindex.html";

});

</script>

</body>
</html>
